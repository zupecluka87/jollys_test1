<!doctype html>
<html lang="sl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>JOLLY-S Mizarstvo</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Inter,sans-serif;
background:#f6f1ea;
color:#1f1c19;
overflow-x:hidden;
}

a{
text-decoration:none;
color:inherit;
}

header{
position:absolute;
top:0;
left:0;
width:100%;
padding:34px 70px;
display:flex;
justify-content:space-between;
align-items:center;
z-index:20;
}

.logo{
display:flex;
align-items:center;
gap:18px;
}

.logo-symbol{
font-family:"Cormorant Garamond",serif;
font-size:54px;
color:#b89c7d;
line-height:1;
}

.logo-text{
font-size:12px;
letter-spacing:.32em;
line-height:1.7;
}

nav{
display:flex;
align-items:center;
gap:38px;
font-size:12px;
letter-spacing:.12em;
}

.nav-btn{
border:1px solid #bfa98d;
padding:14px 24px;
}

.hero{
position:relative;
height:100vh;
min-height:900px;
overflow:hidden;
display:flex;
align-items:center;
}

.hero-image{
position:absolute;
inset:0;
background:
linear-gradient(
90deg,
#f6f1ea 0%,
rgba(246,241,234,.98) 18%,
rgba(246,241,234,.88) 30%,
rgba(246,241,234,.55) 42%,
rgba(246,241,234,.18) 55%,
rgba(246,241,234,0) 70%
),
url("https://images.unsplash.com/photo-1600607687939-ce8a6c25118c?auto=format&fit=crop&w=1800&q=100");
background-size:cover;
background-position:center;
transform:scale(1.02);
}

.hero-content{
position:relative;
z-index:10;
padding-left:90px;
max-width:620px;
}

.eyebrow{
font-size:12px;
letter-spacing:.22em;
margin-bottom:42px;
color:#7f746b;
}

h1{
font-family:"Cormorant Garamond",serif;
font-weight:500;
font-size:96px;
line-height:.93;
margin-bottom:42px;
}

.description{
font-size:17px;
line-height:2;
max-width:430px;
color:#5f554d;
margin-bottom:46px;
}

.hero-link{
display:inline-flex;
align-items:center;
gap:16px;
font-size:13px;
letter-spacing:.14em;
padding-bottom:10px;
border-bottom:1px solid #bfa98d;
}

.side-numbers{
position:absolute;
left:38px;
bottom:80px;
display:flex;
flex-direction:column;
gap:22px;
z-index:10;
}

.side-numbers span{
font-size:13px;
color:#8b7e72;
}

.side-line{
width:1px;
height:34px;
background:#d3c6b7;
margin-top:4px;
}

.menu-icon{
width:32px;
height:22px;
display:flex;
flex-direction:column;
justify-content:space-between;
cursor:pointer;
}

.menu-icon span{
height:1px;
background:#2b2723;
width:100%;
display:block;
}

@media(max-width:1100px){

header{
padding:26px;
}

nav{
display:none;
}

.hero{
min-height:auto;
height:auto;
padding-top:140px;
padding-bottom:120px;
}

.hero-image{
background-position:center right;
}

.hero-content{
padding:0 26px;
max-width:100%;
}

h1{
font-size:62px;
}

.description{
font-size:16px;
}

.side-numbers{
display:none;
}

}

</style>
</head>

<body>

<header>

<div class="logo">
<div class="logo-symbol">JS</div>

<div class="logo-text">
JOLLY-S<br>
MIZARSTVO
</div>
</div>

<nav>
<a href="#">DOMOV</a>
<a href="#">PROJEKTI</a>
<a href="#">STORITVE</a>
<a href="#">MATERIALI</a>
<a href="#">O NAS</a>
<a href="#">KONTAKT</a>

<a href="#" class="nav-btn">
POVPRAŠEVANJE
</a>

<div class="menu-icon">
<span></span>
<span></span>
<span></span>
</div>

</nav>

</header>

<section class="hero">

<div class="hero-image"></div>

<div class="hero-content">

<div class="eyebrow">
MIZARSTVO PO MERI
</div>

<h1>
PROSTORI,<br>
USTVARJENI<br>
ZA ŽIVLJENJE.
</h1>

<div class="description">
Pohištvo in notranje rešitve po meri.
Natančno. Estetsko. Brezčasno.
</div>

<a href="#" class="hero-link">
OGLEJTE SI PROJEKTE →
</a>

</div>

<div class="side-numbers">
<span>01</span>
<div class="side-line"></div>
<span>02</span>
<div class="side-line"></div>
<span>03</span>
</div>

</section>

<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

<script>
if(window.netlifyIdentity){
window.netlifyIdentity.on("init",user=>{
if(!user){
window.netlifyIdentity.on("login",()=>{
document.location.href="/admin/";
});
}
});
}
</script>

</body>
</html>
