<!doctype html>
<html lang="sl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>JOLLY-S Mizarstvo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f8f5f1;--white:#fff;--line:#ddd3ca;--text:#1d1b1a;--muted:#7a7168;--gold:#a18875;--footer:#f1e9e2;--taupe:#d8ccc1;
  --serif:'Cormorant Garamond',serif;--sans:'Inter',sans-serif;
  --headerH:108px;--pad:110px;--heroH:855px;--heroTitle:74px;--sectionTitle:52px;--bodySize:15px;--menuGap:58px;--heroImageW:74%;
  --fadeLeft:1;--fadeTop:.72;--fadeBottom:.92;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--sans);overflow-x:hidden}
img{display:block;width:100%} a{text-decoration:none;color:inherit} button,input{font-family:inherit}
.container{width:100%;padding-left:var(--pad);padding-right:var(--pad)}
.reveal{opacity:0;transform:translateY(24px);transition:opacity .85s ease,transform .85s ease}.reveal.visible{opacity:1;transform:translateY(0)}
.header{position:absolute;top:0;left:0;right:0;z-index:100;height:var(--headerH);background:linear-gradient(to bottom,rgba(248,245,241,.62),rgba(248,245,241,.20));backdrop-filter:blur(10px)}
.header::after{content:"";position:absolute;left:0;right:0;bottom:-95px;height:95px;background:linear-gradient(to bottom,rgba(248,245,241,.40),rgba(248,245,241,0));pointer-events:none}
.navbar{height:var(--headerH);display:grid;grid-template-columns:260px 1fr 190px 60px;align-items:center}
.logo-wrap{display:flex;align-items:center;gap:26px}.logo-mark{font-family:var(--serif);font-size:74px;letter-spacing:-17px;color:var(--gold);line-height:.7}.logo-title{font-size:17px;letter-spacing:10px;font-weight:700}.logo-sub{margin-top:10px;font-size:8px;letter-spacing:7px;color:#8f857c;font-weight:600}
.nav{display:flex;justify-content:center;gap:var(--menuGap)}.nav a{font-size:11px;text-transform:uppercase;font-weight:700;letter-spacing:.018em;position:relative}.nav a::after{content:"";position:absolute;left:0;right:0;bottom:-7px;height:1px;background:currentColor;transform:scaleX(0);transform-origin:right;transition:transform .35s ease}.nav a:hover::after{transform:scaleX(1);transform-origin:left}
.cta-btn{height:56px;border:1px solid #b9ab9f;display:flex;align-items:center;justify-content:center;font-size:11px;text-transform:uppercase;font-weight:700;letter-spacing:.02em;transition:background .3s,color .3s}.cta-btn:hover{background:#1d1b1a;color:#fff}
.burger{width:40px;height:24px;position:relative;justify-self:end;cursor:pointer;z-index:120}.burger span,.burger::before,.burger::after{content:"";position:absolute;left:0;width:100%;height:1.5px;background:#6f665f;transition:.35s ease}.burger span{top:11px}.burger::before{top:0}.burger::after{bottom:0}.burger.active span{opacity:0}.burger.active::before{top:11px;transform:rotate(45deg)}.burger.active::after{bottom:11px;transform:rotate(-45deg)}
.overlay-menu{position:fixed;inset:0;z-index:90;background:rgba(248,245,241,.92);backdrop-filter:blur(20px);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:.45s ease}.overlay-menu.active{opacity:1;pointer-events:auto}.overlay-menu nav{display:flex;flex-direction:column;gap:18px;text-align:center}.overlay-menu a{font-family:var(--serif);font-size:58px;line-height:1;color:#1d1b1a}
.hero{position:relative;height:var(--heroH);overflow:hidden;background:var(--bg)}.hero-image{position:absolute;right:0;top:0;width:var(--heroImageW);height:var(--heroH);overflow:hidden}.hero-image img{width:100%;height:100%;object-fit:cover;object-position:center;transform:scale(1.04);animation:heroZoom 12s ease forwards}@keyframes heroZoom{from{transform:scale(1.08)}to{transform:scale(1.02)}}
.hero-image::before{content:"";position:absolute;inset:0;z-index:2;pointer-events:none;background:linear-gradient(to right,rgba(248,245,241,var(--fadeLeft)) 0%,rgba(248,245,241,.96) 8%,rgba(248,245,241,.68) 23%,rgba(248,245,241,.18) 42%,rgba(248,245,241,0) 60%),linear-gradient(to bottom,rgba(248,245,241,var(--fadeTop)) 0%,rgba(248,245,241,.22) 14%,rgba(248,245,241,0) 34%),linear-gradient(to top,rgba(248,245,241,var(--fadeBottom)) 0%,rgba(248,245,241,.12) 22%,rgba(248,245,241,0) 40%)}
.hero-content{position:relative;z-index:5;height:var(--heroH);padding-top:var(--headerH);display:grid;grid-template-columns:60px 450px 1fr;align-items:center;gap:80px}.slider{align-self:end;margin-bottom:120px}.slider strong{display:block;margin-bottom:14px;font-size:13px}.slider-line{width:1px;height:54px;background:#aa9f96;margin:0 auto 20px}.slider span{display:block;margin:18px 0;color:#958b83;text-align:center;font-size:13px}
.eyebrow{margin-bottom:38px;font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:#726960;font-weight:600}.hero h1{font-family:var(--serif);font-size:var(--heroTitle);line-height:1.04;font-weight:400;letter-spacing:-.035em;text-transform:uppercase;margin-bottom:34px}.small-line{width:48px;height:1px;background:#a89b8e;margin-bottom:28px}.hero p{font-size:var(--bodySize);line-height:1.9;margin-bottom:44px;font-weight:500}
.link{display:inline-grid;grid-template-columns:auto 70px;gap:20px;align-items:center;border-bottom:1px solid #b8aca1;padding-bottom:12px;min-width:280px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em}.link span:last-child{text-align:right;font-size:22px;font-weight:400;transition:.3s}.link:hover span:last-child{transform:translateX(7px)}
.features{min-height:205px;background:rgba(255,255,255,.55)}.features-grid{min-height:205px;display:grid;grid-template-columns:repeat(4,1fr);align-items:center}.feature{display:grid;grid-template-columns:60px 1fr;gap:24px;position:relative;padding-right:42px}.feature:not(:last-child)::after{content:"";position:absolute;right:25px;top:0;bottom:0;width:1px;background:#e2d9d0}.feature-icon{width:42px;height:42px;color:#aa8d7d}.feature-icon svg{width:42px;height:42px;stroke:currentColor;fill:none;stroke-width:1.35;stroke-linecap:round;stroke-linejoin:round}.feature h3{font-family:var(--serif);font-size:25px;margin-bottom:18px;font-weight:600}.feature p{font-size:11px;line-height:1.8;max-width:220px;color:#3b3631;font-weight:500}
.projects{padding:80px 0 60px;background:#fff}.projects-grid{display:grid;grid-template-columns:280px 1fr;gap:70px}.kicker{margin-bottom:22px;font-size:9px;text-transform:uppercase;font-weight:700;letter-spacing:.08em;color:#706760}.section-title{font-family:var(--serif);font-size:var(--sectionTitle);line-height:1;font-weight:500;letter-spacing:-.025em;margin-bottom:50px}.project-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:28px}.project-image{aspect-ratio:1.32/1;overflow:hidden;background:#ddd}.project-image img{width:100%;height:100%;object-fit:cover;transition:transform .7s ease,filter .7s ease}.project:hover img{transform:scale(1.055);filter:brightness(.92)}.project h3{margin-top:16px;margin-bottom:8px;font-size:14px;font-weight:700}.project p{font-size:10px;text-transform:uppercase;color:#7f756d;letter-spacing:.06em;font-weight:600}.arrows{display:flex;justify-content:flex-end;gap:18px;margin-top:26px}.arrow{width:56px;height:56px;border-radius:50%;border:1px solid #cdbfb3;display:flex;align-items:center;justify-content:center;font-size:24px;color:#6b625b;transition:.3s}.arrow:hover{background:#1d1b1a;color:#fff}
.materials{display:grid;grid-template-columns:360px 1fr;background:#f5efe9}.material-left{background:#f5efe9;padding:42px 0 42px var(--pad)}.material-left .section-title{font-size:42px;margin-bottom:34px}.material-left p{margin-bottom:32px;max-width:230px;font-size:11px;line-height:1.8;color:#514a43;font-weight:500}.material-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr))}.material-card{position:relative;height:340px;overflow:hidden;color:white;display:flex;align-items:flex-end}.material-card img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transition:transform .8s ease,filter .8s ease}.material-card::after{content:"";position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.68),rgba(0,0,0,.05) 65%);transition:.5s}.material-card:hover img{transform:scale(1.08);filter:blur(1px) brightness(.92)}.material-card:hover::after{background:linear-gradient(to top,rgba(0,0,0,.76),rgba(0,0,0,.10) 70%)}.material-content{position:relative;z-index:2;padding:34px}.material-content h3{font-family:var(--serif);font-size:28px;margin-bottom:10px;font-weight:500}.material-content p{font-size:11px;line-height:1.6;max-width:150px}.plus{position:absolute;right:20px;bottom:20px;z-index:3;width:34px;height:34px;border-radius:50%;border:1px solid rgba(255,255,255,.7);display:flex;align-items:center;justify-content:center;font-size:18px;transition:.35s}.material-card:hover .plus{transform:rotate(90deg);background:rgba(255,255,255,.16)}
.process{background:#fff;padding:45px 0}.process-grid{display:grid;grid-template-columns:280px 1fr;gap:80px}.steps{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));position:relative;margin-top:28px}.steps::before{content:"";position:absolute;left:90px;right:90px;top:16px;height:1px;background:#ddd1c6}.step{text-align:center;position:relative}.process-icon{width:31px;height:31px;margin:0 auto 3px;color:#aa8d7d;font-size:28px;position:relative;z-index:2;background:white}.dot{position:absolute;top:14px;left:50%;transform:translateX(-50%);width:5px;height:5px;background:#a48d7c;border-radius:50%}.step-number{margin-top:16px;margin-bottom:10px;font-size:9px;color:#8d8279}.step h4{font-family:var(--serif);font-size:18px;margin-bottom:10px;font-weight:600}.step p{font-size:8.5px;line-height:1.5;color:#5f574f}
.bottom-cta{min-height:170px;display:grid;grid-template-columns:1fr 420px;overflow:hidden}.bottom-left{position:relative}.bottom-left img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}.bottom-overlay{position:absolute;inset:0;background:linear-gradient(to right,rgba(70,56,46,.72),rgba(70,56,46,.15),rgba(70,56,46,.03))}.bottom-title{position:relative;z-index:3;height:170px;padding-left:var(--pad);display:flex;flex-direction:column;justify-content:center}.bottom-title h2{color:white;font-family:var(--serif);font-size:38px;line-height:1;margin-bottom:20px;font-weight:500}.bottom-title a{width:160px;height:42px;background:white;color:#49413b;display:flex;align-items:center;justify-content:space-between;padding:0 18px;font-size:10px;font-weight:700;transition:.3s}.bottom-title a:hover{background:#1d1b1a;color:#fff}.bottom-contact{background:#d8ccc1;display:flex;flex-direction:column;justify-content:center;padding-left:60px;gap:14px}.bottom-contact p{display:flex;gap:18px;margin:0;font-size:14px}.bottom-contact span{font-size:13px}
.footer{background:#f1e9e2;padding:30px var(--pad) 20px}.footer-grid{display:grid;grid-template-columns:260px 180px 220px 1fr;gap:50px}.footer-logo{display:flex;align-items:center;gap:18px;margin-bottom:14px}.footer-mark{font-family:var(--serif);font-size:46px;letter-spacing:-10px;color:var(--gold)}.footer-name{font-size:11px;font-weight:700;letter-spacing:5px}.footer-sub{margin-top:5px;font-size:6px;letter-spacing:4px;color:#8f857c}.footer p,.footer li{font-size:10px;line-height:1.9;color:#5d554d}.footer h4{margin-bottom:12px;font-size:9px;text-transform:uppercase;letter-spacing:.06em}.footer ul{list-style:none}.socials{display:flex;gap:12px;margin:12px 0}.newsletter{margin-top:16px;height:42px;border:0;border-bottom:1px solid #cabdb1;display:grid;grid-template-columns:1fr 50px;max-width:340px}.newsletter input{border:none;background:transparent;padding:0 2px;font-size:10px;outline:none}.newsletter button{border:0;background:transparent;font-size:16px}.legal{display:flex;gap:40px;margin-top:16px;font-size:8px;color:#7e756d}
@media(max-width:1100px){:root{--pad:28px}.navbar{grid-template-columns:1fr 40px}.nav,.cta-btn{display:none}.hero{height:auto;min-height:760px}.hero-image{width:100%;height:760px}.hero-content{grid-template-columns:1fr;height:760px;padding-top:130px}.slider{display:none}.hero h1{font-size:52px}.features-grid,.projects-grid,.materials,.process-grid,.bottom-cta,.footer-grid{grid-template-columns:1fr;height:auto}.feature{padding:28px 0}.feature:not(:last-child)::after,.steps::before{display:none}.material-left{padding:42px var(--pad)}.material-card{height:280px}.step{padding:18px 0}.bottom-left{height:260px}.bottom-title{height:260px}.bottom-contact{padding:30px 28px}.footer{padding:30px 28px}.overlay-menu a{font-size:42px}}
</style>
</head>
<body>
<header class="header"><div class="container navbar"><div class="logo-wrap"><div class="logo-mark" id="logoMark"></div><div><div class="logo-title" id="logoTitle"></div><div class="logo-sub" id="logoSub"></div></div></div><nav class="nav" id="desktopNav"></nav><a href="#kontakt" class="cta-btn" id="headerButton"></a><div class="burger" id="burger"><span></span></div></div></header>
<div class="overlay-menu" id="overlayMenu"><nav id="mobileNav"></nav></div>
<section id="domov" class="hero"><div class="hero-image"><img id="heroImage" alt=""></div><div class="container hero-content"><div class="slider"><strong>01</strong><div class="slider-line"></div><span>02</span><span>03</span></div><div class="reveal"><div class="eyebrow" id="heroEyebrow"></div><h1 id="heroTitle"></h1><div class="small-line"></div><p id="heroText"></p><a id="heroLink" class="link"><span id="heroButton"></span><span>→</span></a></div></div></section>
<section id="storitve" class="features"><div class="container features-grid" id="featuresGrid"></div></section>
<section id="projekti" class="projects"><div class="container projects-grid"><div class="reveal"><div class="kicker" id="projectsKicker"></div><div class="section-title" id="projectsTitle"></div><a id="projectsLink" class="link"><span id="projectsButton"></span><span>→</span></a></div><div class="reveal"><div class="project-cards" id="projectCards"></div><div class="arrows"><div class="arrow">←</div><div class="arrow">→</div></div></div></div></section>
<section id="materiali" class="materials"><div class="material-left reveal"><div class="kicker" id="materialsKicker"></div><div class="section-title" id="materialsTitle"></div><p id="materialsText"></p><a id="materialsLink" class="link"><span id="materialsButton"></span><span>→</span></a></div><div class="material-grid" id="materialGrid"></div></section>
<section id="onas" class="process"><div class="container process-grid"><div class="reveal"><div class="kicker" id="processKicker"></div><div class="section-title" id="processTitle"></div></div><div class="steps reveal" id="stepsGrid"></div></div></section>
<section id="kontakt" class="bottom-cta"><div class="bottom-left"><img id="ctaImage" alt=""><div class="bottom-overlay"></div><div class="bottom-title"><h2 id="ctaTitle"></h2><a id="ctaLink"><span id="ctaButton"></span><span>→</span></a></div></div><div class="bottom-contact"><p>⌕ <span id="phone"></span></p><p>✉ <span id="email"></span></p><p>⌖ <span id="address"></span></p></div></section>
<footer class="footer"><div class="footer-grid"><div><div class="footer-logo"><div class="footer-mark" id="footerLogoMark"></div><div><div class="footer-name" id="footerLogoTitle"></div><div class="footer-sub" id="footerLogoSub"></div></div></div><p id="footerText"></p><div class="socials"><span>◎</span><span>●</span></div><small id="copyright"></small></div><div><h4 id="quickTitle"></h4><ul id="quickLinks"></ul></div><div><h4 id="servicesTitle"></h4><ul id="services"></ul></div><div><h4 id="newsletterTitle"></h4><p id="newsletterText"></p><form class="newsletter"><input id="newsletterPlaceholder"><button type="button">→</button></form><div class="legal"><span id="privacy"></span><span id="terms"></span></div></div></div></footer>
<script src="data/site-data.js"></script>
<script>
const D=window.SITE_DATA;function setHTML(id,v){let e=document.getElementById(id);if(e)e.innerHTML=v||""}function setSrc(id,v){let e=document.getElementById(id);if(e)e.src=v||""}function setHref(id,v){let e=document.getElementById(id);if(e)e.href=v||"#"}
function iconSVG(t){let i={leaf:'<svg viewBox="0 0 48 48"><path d="M8 37c12-2 20-11 25-27M13 31C8 22 10 14 19 8c5 10 3 18-4 24M30 21c6-7 12-9 18-6-2 10-9 14-19 12M29 29v11M10 40h30"/></svg>',cabinet:'<svg viewBox="0 0 48 48"><path d="M10 8h28v32H10zM16 13v22M24 13v22M32 13v22M18 24h3M26 24h3M34 24h2"/></svg>',person:'<svg viewBox="0 0 48 48"><path d="M24 7c5 0 8 4 8 8s-3 8-8 8-8-4-8-8 3-8 8-8zM10 40c1-8 6-13 14-13s13 5 14 13M12 33l-5 4 4 4M36 33l5 4-4 4"/></svg>',clock:'<svg viewBox="0 0 48 48"><circle cx="24" cy="24" r="16"/><path d="M24 13v11l8-5M35 10l3-3M13 10l-3-3"/></svg>'};return i[t]||i.leaf}
function render(){document.title=D.settings.siteTitle;let r=document.documentElement.style;r.setProperty("--gold",D.settings.primaryColor);r.setProperty("--bg",D.settings.backgroundColor);r.setProperty("--text",D.settings.textColor);r.setProperty("--headerH",D.settings.headerHeight+"px");r.setProperty("--pad",D.settings.containerPadding+"px");r.setProperty("--heroH",D.settings.heroHeight+"px");r.setProperty("--heroTitle",D.settings.heroTitleSize+"px");r.setProperty("--sectionTitle",D.settings.sectionTitleSize+"px");r.setProperty("--bodySize",D.settings.bodyFontSize+"px");r.setProperty("--menuGap",D.settings.menuGap+"px");r.setProperty("--heroImageW",D.hero.imageWidth+"%");r.setProperty("--fadeLeft",D.hero.fadeLeft);r.setProperty("--fadeTop",D.hero.fadeTop);r.setProperty("--fadeBottom",D.hero.fadeBottom);
setHTML("logoMark",D.settings.logoMark);setHTML("logoTitle",D.settings.logoTitle);setHTML("logoSub",D.settings.logoSub);setHTML("headerButton",D.settings.headerButton);setHTML("footerLogoMark",D.settings.logoMark);setHTML("footerLogoTitle",D.settings.logoTitle);setHTML("footerLogoSub",D.settings.logoSub);
let nav=D.settings.menuItems||[];desktopNav.innerHTML=nav.map(x=>`<a href="${x.url}">${x.text}</a>`).join("");mobileNav.innerHTML=nav.map(x=>`<a href="${x.url}">${x.text}</a>`).join("");
setSrc("heroImage",D.hero.image);setHTML("heroEyebrow",D.hero.eyebrow);setHTML("heroTitle",D.hero.title);setHTML("heroText",D.hero.text);setHTML("heroButton",D.hero.button);setHref("heroLink",D.hero.buttonUrl);
featuresGrid.innerHTML=D.features.map(f=>`<div class="feature reveal"><div class="feature-icon">${iconSVG(f.icon)}</div><div><h3>${f.title}</h3><p>${f.text}</p></div></div>`).join("");
setHTML("projectsKicker",D.projects.kicker);setHTML("projectsTitle",D.projects.title);setHTML("projectsButton",D.projects.button);setHref("projectsLink",D.projects.buttonUrl);projectCards.innerHTML=D.projects.items.map(p=>`<div class="project"><div class="project-image"><img src="${p.image}" alt="${p.title}"></div><h3>${p.title}</h3><p>${p.subtitle}</p></div>`).join("");
setHTML("materialsKicker",D.materials.kicker);setHTML("materialsTitle",D.materials.title);setHTML("materialsText",D.materials.text);setHTML("materialsButton",D.materials.button);setHref("materialsLink",D.materials.buttonUrl);materialGrid.innerHTML=D.materials.items.map(m=>`<div class="material-card reveal"><img src="${m.image}" alt="${m.title}"><div class="material-content"><h3>${m.title}</h3><p>${m.text}</p></div><div class="plus">+</div></div>`).join("");
setHTML("processKicker",D.process.kicker);setHTML("processTitle",D.process.title);stepsGrid.innerHTML=D.process.items.map(s=>`<div class="step"><div class="process-icon">${s.icon}</div><div class="dot"></div><div class="step-number">${s.number}</div><h4>${s.title}</h4><p>${s.text}</p></div>`).join("");
setSrc("ctaImage",D.cta.image);setHTML("ctaTitle",D.cta.title);setHTML("ctaButton",D.cta.button);setHref("ctaLink",D.cta.buttonUrl);setHTML("phone",D.cta.phone);setHTML("email",D.cta.email);setHTML("address",D.cta.address);
setHTML("footerText",D.footer.text);setHTML("copyright",D.footer.copyright);setHTML("quickTitle",D.footer.quickTitle);setHTML("servicesTitle",D.footer.servicesTitle);quickLinks.innerHTML=D.footer.quickLinks.map(x=>`<li>${x}</li>`).join("");services.innerHTML=D.footer.services.map(x=>`<li>${x}</li>`).join("");setHTML("newsletterTitle",D.footer.newsletterTitle);setHTML("newsletterText",D.footer.newsletterText);newsletterPlaceholder.placeholder=D.footer.newsletterPlaceholder;setHTML("privacy",D.footer.privacy);setHTML("terms",D.footer.terms)}
render();burger.onclick=()=>{burger.classList.toggle("active");overlayMenu.classList.toggle("active")};overlayMenu.querySelectorAll("a").forEach(a=>a.onclick=()=>{burger.classList.remove("active");overlayMenu.classList.remove("active")});let io=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting)e.target.classList.add("visible")}),{threshold:.16});document.querySelectorAll(".reveal").forEach(el=>io.observe(el));
</script></body></html>
