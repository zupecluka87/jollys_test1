<!doctype html>
<html lang="sl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>JOLLY-S Mizarstvo</title>

  <!-- Fonti: za najbolj podoben izgled uporabi Cormorant Garamond + Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#f7f4ef;
      --paper:#fbfaf7;
      --ink:#252423;
      --muted:#7f766d;
      --line:#d8d0c8;
      --line-2:#c5bbb1;
      --taupe:#b8aa9e;
      --soft:#efe8df;
      --white:#ffffff;
      --shadow: 0 24px 60px rgba(50,42,35,.10);
      --serif:'Cormorant Garamond', Georgia, serif;
      --sans:'Inter', Arial, sans-serif;
    }

    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      background:var(--paper);
      color:var(--ink);
      font-family:var(--sans);
      -webkit-font-smoothing:antialiased;
      text-rendering:geometricPrecision;
    }
    a{color:inherit;text-decoration:none}
    img{max-width:100%;display:block}
    button{font:inherit;color:inherit;background:none;border:0;cursor:pointer}

    .page{overflow:hidden;background:var(--paper)}
    .container{width:min(100%, 1496px);margin:0 auto;padding:0 72px}

    /* HEADER */
    .header{
      position:fixed;
      top:0;left:0;right:0;
      z-index:20;
      height:138px;
      background:rgba(248,245,240,.83);
      backdrop-filter:blur(18px);
      border-bottom:1px solid rgba(205,196,187,.70);
    }
    .header::after{
      content:"";
      position:absolute;left:0;right:0;bottom:-60px;height:60px;
      background:linear-gradient(to bottom, rgba(248,245,240,.80), rgba(248,245,240,0));
      pointer-events:none;
    }
    .navwrap{
      height:100%;
      display:grid;
      grid-template-columns:310px 1fr 180px 70px;
      align-items:center;
      gap:28px;
    }
    .brand{display:flex;align-items:center;gap:28px;min-width:260px}
    .mark{
      width:52px;height:66px;
      color:#9f8878;
      display:grid;place-items:center;
      font-family:var(--serif);
      font-size:68px;
      letter-spacing:-15px;
      line-height:.7;
      font-weight:400;
      transform:translateY(-1px);
    }
    .brandtext strong{
      display:block;
      font-size:18px;
      letter-spacing:10px;
      font-weight:700;
      line-height:1;
    }
    .brandtext span{
      display:block;
      margin-top:12px;
      font-size:10px;
      letter-spacing:8px;
      font-weight:600;
      color:#9b9188;
    }
    .nav{display:flex;justify-content:center;gap:64px;align-items:center}
    .nav a{
      font-size:12px;
      font-weight:700;
      letter-spacing:.04em;
      text-transform:uppercase;
      opacity:.86;
    }
    .quote{
      height:48px;
      border:1px solid #bfb4aa;
      display:grid;place-items:center;
      font-size:12px;
      font-weight:700;
      text-transform:uppercase;
